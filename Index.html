<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Quiz App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="quiz-container">

        <h1>Quiz Application</h1>

        <!-- Progress Bar -->
        <div id="progressBar">
            <div id="progress"></div>
        </div>

        <!-- Timer -->
        <div class="top-info">
            <h3 id="timer">Time: 15</h3>
            <h3 id="scoreDisplay">Score: 0</h3>
        </div>

        <!-- Question -->
        <h2 id="question">Question Here</h2>

        <!-- Options -->
        <div id="options"></div>

        <!-- Buttons -->
        <div class="buttons">
            <button id="nextBtn">Next</button>
            <button id="restartBtn">Restart</button>
        </div>

        <!-- Result -->
        <div id="result"></div>

        <!-- High Score -->
        <h3 id="highScore"></h3>

    </div>

    <script src="questions.js"></script>
    <script src="script.js"></script>

</body>

</html>
